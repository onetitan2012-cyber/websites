<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>疯狂的螳螂</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        /* 游戏容器 */
        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        
        /* 游戏画布容器 */
        #canvasContainer {
            position: relative;
            width: min(100vw, 56.25vh);
            height: min(177.78vw, 100vh);
            max-width: 500px;
            max-height: 900px;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* 返回主页按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px 18px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            background: #fff;
        }
        
        /* UI 层 */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 15px;
        }
        
        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .scoreBoard {
            background: rgba(139, 90, 43, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(218, 165, 105, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        .scoreBoard .label { font-size: 12px; opacity: 0.8; }
        .scoreBoard .score { font-size: 28px; font-weight: bold; color: #FFD700; }
        
        .currency {
            background: rgba(139, 90, 43, 0.85);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            border: 1px solid rgba(218, 165, 105, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .health-bar {
            position: absolute;
            top: 130px;
            left: 15px;
            display: flex;
            gap: 6px;
            background: rgba(139, 90, 43, 0.85);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(218, 165, 105, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        
        /* 倒计时 */
        .timer-display {
            position: absolute;
            top: 180px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(139, 90, 43, 0.85);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(218, 165, 105, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        .timer-icon {
            width: 24px;
            height: 24px;
            position: relative;
        }
        .timer-icon svg {
            width: 100%;
            height: 100%;
        }
        .timer-text {
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            min-width: 36px;
            text-align: center;
        }
        .timer-text.warning {
            color: #FF6B6B;
            animation: timerPulse 0.5s ease-in-out infinite;
        }
        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        }
        .health-heart { font-size: 24px; }
        
        /* 成语提示 */
        .proverb-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(60, 40, 20, 0.75);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(218, 165, 105, 0.3);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 2px 12px rgba(0,0,0,0.4);
            max-width: 90%;
            white-space: nowrap;
        }
        .proverb-text {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
            letter-spacing: 2px;
            margin-bottom: 4px;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .proverb-meaning {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            white-space: nowrap;
        }
        
        .level-display {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(139, 90, 43, 0.85);
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(218, 165, 105, 0.4);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        
        /* 弹窗 */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }
        .modal.hidden { display: none !important; }
        
        .modal-content {
            background: linear-gradient(135deg, #8B5A2B 0%, #654321 100%);
            padding: 35px 30px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 85%;
            max-width: 320px;
            border: 2px solid rgba(218, 165, 105, 0.5);
        }
        .modal-content h1 { 
            font-size: 32px; 
            margin-bottom: 12px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }
        .claw-icon { width: 80px; height: 80px; margin: 10px auto; animation: bounce 1.2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-12px) rotate(10deg); }
        }
        .modal-content p { font-size: 14px; margin: 8px 0; line-height: 1.4; }
        
        .btn {
            background: linear-gradient(135deg, #C4A35A 0%, #8B6914 100%);
            color: #2C1810;
            border: 1px solid rgba(218, 165, 105, 0.5);
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            pointer-events: auto;
        }
        .btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
            background: linear-gradient(135deg, #D4B36A 0%, #9B7924 100%);
        }
        
        .tutorial {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
            margin: 12px 0;
            text-align: left;
            border: 1px solid rgba(218, 165, 105, 0.2);
        }
        .tutorial-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            font-size: 13px;
        }
        .tutorial-item img { width: 24px; height: 24px; margin-right: 10px; }
        .tutorial-item span { font-size: 20px; margin-right: 10px; width: 30px; text-align: center; }
        
        .combo {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 52px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: comboPop 1s ease-out forwards;
        }
        
        /* 结束页文化文案 */
        .end-quote {
            background: rgba(0,0,0,0.25);
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
            border: 1px solid rgba(218, 165, 105, 0.3);
            border-left: 3px solid #FFD700;
        }
        .quote-text {
            font-size: 20px;
            color: #FFD700;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .quote-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
        }
        @keyframes comboPop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -90%) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回主页</a>
    <div id="gameWrapper">
        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
            
            <div id="uiLayer">
                <div class="ui-top">
                    <div class="scoreBoard">
                        <div class="label">得分</div>
                        <div class="score" id="scoreDisplay">0</div>
                    </div>
                    <div class="currency">
                        <img src="images/crazy-mantis/dewdrop.png" width="24" height="24" alt="露珠">
                        <span id="dewdropDisplay">0</span>
                    </div>
                </div>
                
                <div class="health-bar" id="healthBar">
                    <span class="health-heart">❤️</span>
                    <span class="health-heart">❤️</span>
                    <span class="health-heart">❤️</span>
                </div>
                
                <!-- 倒计时 -->
                <div class="timer-display" id="timerDisplay">
                    <div class="timer-icon">
                        <svg viewBox="0 0 24 24" fill="none">
                            <!-- 水滴外框 -->
                            <path d="M12 2C12 2 6 8 6 13C6 16.5 8.5 20 12 20C15.5 20 18 16.5 18 13C18 8 12 2 12 2Z" 
                                  stroke="#87CEEB" stroke-width="2" fill="rgba(135, 206, 235, 0.3)"/>
                            <!-- 水位 -->
                            <path id="timerWaterLevel" d="M6 13C6 13 8 15 12 15C16 15 18 13 18 13V20H6V13Z" 
                                  fill="#87CEEB"/>
                        </svg>
                    </div>
                    <span class="timer-text" id="timerText">300</span>
                </div>
                
                <div class="level-display">关卡 <span id="levelDisplay">1</span></div>
                
                <div class="proverb-hint">
                    <div class="proverb-text">螳螂捕蝉，黄雀在后</div>
                    <div class="proverb-meaning">专注捕猎，但也要警惕身后的危险</div>
                </div>
            </div>
            
            <!-- 开始界面 -->
            <div id="startModal" class="modal">
                <div class="modal-content">
                    <h1>疯狂的螳螂</h1>
                    <img src="images/crazy-mantis/mantis_body.png" class="claw-icon" alt="螳螂">
                    <p>绕着树桩爬行，伸出利爪捕蝉！</p>
                    <div class="tutorial">
                        <div class="tutorial-item"><img src="images/crazy-mantis/mantis_body.png" alt=""><div>螳螂自动绕圈爬行</div></div>
                        <div class="tutorial-item"><span>👆</span><div>点击屏幕伸出利爪</div></div>
                        <div class="tutorial-item"><img src="images/crazy-mantis/cicada_1.png" alt=""><div>砍中蝉得分</div></div>
                        <div class="tutorial-item"><img src="images/crazy-mantis/trap_leaf.png" alt=""><div>避开枯叶陷阱</div></div>
                    </div>
                    <button class="btn" id="startBtn">开始游戏</button>
                </div>
            </div>
            
            <!-- 游戏结束界面 -->
            <div id="gameOverModal" class="modal hidden">
                <div class="modal-content">
                    <h1>游戏结束</h1>
                    <div style="font-size: 60px; margin: 10px 0;">😵</div>
                    
                    <!-- 文化文案 -->
                    <div class="end-quote" id="endQuote">
                        <div class="quote-text"></div>
                        <div class="quote-sub"></div>
                    </div>
                    
                    <p>最终得分: <span id="finalScore" style="font-size: 32px; color: #FFD700;">0</span></p>
                    <p>收集露珠: <span id="finalDewdrops" style="color: #87CEEB;">0</span> 💧</p>
                    <p>最高连击: <span id="maxCombo" style="color: #FF6B6B;">0</span></p>
                    <button class="btn" id="restartBtn">再玩一次</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        
        // 固定画布尺寸
        const GAME_WIDTH = 500;
        const GAME_HEIGHT = 900;
        
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        // 游戏区域参数
        const centerX = GAME_WIDTH / 2;
        const centerY = GAME_HEIGHT / 2 + 20;
        const diskRadius = 130;
        
        // 资源路径
        const ASSETS_PATH = 'images/crazy-mantis/';
        
        // 图片资源
        const images = {};
        const imageFiles = {
            bg: 'bg_sky.jpg',
            treeDisk: 'tree_disk.png',
            treeCenter: 'tree_center.png',
            mantisBody: 'mantis_body.png',
            mantisClaw: 'mantis_claw.png',
            mantisClawAttack: 'mantis_claw_attack.png',
            cicada1: 'cicada_1.png',
            cicada2: 'cicada_2.png',
            cicada3: 'cicada_3.png',
            cicada4: 'cicada_4.png',
            trapLeaf: 'trap_leaf.png',
            trapSpider: 'trap_spider.png',
            dewdrop: 'dewdrop.png',
            slashEffect: 'slash_effect.png'
        };
        
        // 音频资源
        const sounds = {};
        const soundFiles = {
            hit: 'sfx_hit.mp3',
            trap: 'sfx_trap.mp3',
            dewdrop: 'sfx_dewdrop.mp3',
            attack: 'sfx_attack.mp3',
            levelup: 'sfx_levelup.mp3',
            gameover: 'sfx_gameover.mp3',
            bgm: 'bgm_game.mp3'
        };
        
        // 加载图片
        function loadImage(name, src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    images[name] = img;
                    resolve();
                };
                img.onerror = () => {
                    console.error('Failed to load image:', src);
                    resolve();
                };
                img.src = ASSETS_PATH + src;
            });
        }
        
        // 加载音频
        function loadSound(name, src) {
            sounds[name] = new Audio(ASSETS_PATH + src);
            sounds[name].preload = 'auto';
        }
        
        // 播放音效 - 使用对象池避免频繁创建
        const audioPool = {};
        const audioPoolIndex = {};
        const POOL_SIZE = 5;
        
        // 初始化音频池
        function initAudioPool() {
            Object.keys(soundFiles).forEach(name => {
                if (name === 'bgm') return;
                audioPool[name] = [];
                audioPoolIndex[name] = 0;
                for (let i = 0; i < POOL_SIZE; i++) {
                    const audio = new Audio(ASSETS_PATH + soundFiles[name]);
                    audio.volume = 0.6;
                    audioPool[name].push(audio);
                }
            });
        }
        
        function playSound(name) {
            if (name === 'bgm' || !audioPool[name]) return;
            const pool = audioPool[name];
            const idx = audioPoolIndex[name];
            const audio = pool[idx];
            audio.currentTime = 0;
            audio.play().catch(e => {});
            audioPoolIndex[name] = (idx + 1) % POOL_SIZE;
        }
        
        // 播放背景音乐
        let bgmPlaying = false;
        function playBGM() {
            if (sounds.bgm && !bgmPlaying) {
                sounds.bgm.loop = true;
                sounds.bgm.volume = 0.3;
                sounds.bgm.play().catch(e => console.log('BGM play failed:', e));
                bgmPlaying = true;
            }
        }
        
        function stopBGM() {
            if (sounds.bgm) {
                sounds.bgm.pause();
                sounds.bgm.currentTime = 0;
                bgmPlaying = false;
            }
        }
        
        // 加载所有资源
        async function loadAssets() {
            const imagePromises = Object.entries(imageFiles).map(([name, src]) => loadImage(name, src));
            await Promise.all(imagePromises);
            
            Object.entries(soundFiles).forEach(([name, src]) => loadSound(name, src));
            initAudioPool();
        }
        
        // 游戏状态
        let state = 'menu';
        let score = 0;
        let dewdrops = 0;
        let level = 1;
        let health = 3;
        let combo = 0;
        let maxCombo = 0;
        let lastHitTime = 0;
        let powerCombo = 0;  // 连击强化计数
        let isPowered = false;  // 是否处于强化状态
        let powerTimer = 0;  // 强化状态计时器
        let gameTime = 300;  // 游戏倒计时（秒）- 无限生存模式，初始300秒
        let lastTimeUpdate = 0;  // 上次更新时间
        
        // 螳螂
        const mantis = {
            angle: -Math.PI / 2,
            speed: 0.015,
            direction: 1,
            isAttacking: false,
            attackProgress: 0,
            clawLength: 0,
            maxClawLength: 230,  // 攻击爪更长，能伸到树桩
            isPreparing: false,  // 是否处于预备状态
            prepareProgress: 0   // 预备动画进度
        };
        
        // 游戏对象
        let items = [];
        let particles = [];
        let dewdrops_arr = [];
        let itemIdCounter = 0;
        let hitItemsThisAttack = new Set();
        
        // DOM 元素缓存
        let comboElCache = null;
        let levelElCache = null;
        
        // 蝉类配置
        const cicadaTypes = [
            { type: 'cicada', image: 'cicada1', value: 10, size: 22 },  // 96x96高清图片，显示尺寸22px
            { type: 'cicada', image: 'cicada2', value: 20, size: 21 },
            { type: 'cicada', image: 'cicada3', value: 30, size: 24 },
            { type: 'cicada', image: 'cicada4', value: 50, size: 20 }
        ];
        
        const trapTypes = [
            { type: 'trap', image: 'trapLeaf', value: 0, size: 26 },  // 96x96高清图片，显示尺寸26px
            { type: 'trap', image: 'trapSpider', value: 0, size: 24 }
        ];
        
        // 当前关卡的主要元素类型（控制密度规则）
        let currentLevelPrimaryType = 'cicada';  // 'cicada' 或 'mosquito'
        
        // 难度配置 - 随关卡递增
        function getDifficultyConfig() {
            // 基础陷阱比例随关卡增加
            const baseTrapRate = Math.min(0.55, 0.35 + level * 0.02);  // 从35%开始，每关+2%，最高55%
            
            // 最小陷阱数（确保有挑战）
            const minTraps = Math.min(4, 1 + Math.floor(level / 2));  // 第1关至少1个，第6关至少4个
            
            return { baseTrapRate, minTraps };
        }
        
        function spawnItemAtAngle(angle) {
            const { baseTrapRate, minTraps } = getDifficultyConfig();
            
            // 统计当前元素
            const cicadaCount = items.filter(i => i.type === 'cicada').length;
            const trapCount = items.filter(i => i.type === 'trap').length;
            const totalCount = items.length;
            
            let typeConfig;
            
            // 规则1：确保最少陷阱数
            if (trapCount < minTraps && totalCount > 0) {
                typeConfig = trapTypes[Math.floor(Math.random() * trapTypes.length)];
            }
            // 规则2：根据概率生成
            else {
                const rand = Math.random();
                typeConfig = rand < (1 - baseTrapRate) 
                    ? cicadaTypes[Math.floor(Math.random() * cicadaTypes.length)]
                    : trapTypes[Math.floor(Math.random() * trapTypes.length)];
            }
            
            const distanceFromCenter = diskRadius - 25 - Math.random() * 20;  // 稍微靠近边缘，155-175px
            
            items.push({
                id: itemIdCounter++,
                angle: angle,
                distance: distanceFromCenter,
                x: centerX + Math.cos(angle) * distanceFromCenter,
                y: centerY + Math.sin(angle) * distanceFromCenter,
                ...typeConfig
            });
        }
        
        function spawnInitialItems() {
            items = [];
            // 元素总数随关卡增加，但增速放缓
            const count = Math.min(20, 6 + level * 2);  // 从8个开始，每关+2，最高20个
            
            // 先生成确保的最小陷阱数
            const { minTraps } = getDifficultyConfig();
            
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.5;  // 增加随机偏移
                spawnItemAtAngle(angle);
            }
            
            // 如果随机生成后陷阱还不够，强制补充
            const currentTraps = items.filter(i => i.type === 'trap').length;
            if (currentTraps < minTraps) {
                const cicadas = items.filter(i => i.type === 'cicada');
                const needReplace = Math.min(minTraps - currentTraps, cicadas.length);
                for (let i = 0; i < needReplace; i++) {
                    const idx = items.indexOf(cicadas[i]);
                    if (idx !== -1) {
                        items[idx] = {
                            ...items[idx],
                            ...trapTypes[Math.floor(Math.random() * trapTypes.length)]
                        };
                    }
                }
            }
        }
        
        function attack() {
            if (mantis.isAttacking || mantis.isPreparing) return;
            
            // 进入预备状态，扭动屁股
            mantis.isPreparing = true;
            mantis.prepareProgress = 0;
            // 预备音效（可选）
            // playSound('prepare');
        }
        
        function checkAttackCollision() {
            const orbitR = diskRadius + 130;  // 螳螂远离树桩，增加距离感
            const mantisX = centerX + Math.cos(mantis.angle) * orbitR;
            const mantisY = centerY + Math.sin(mantis.angle) * orbitR;
            const attackAngle = mantis.angle + Math.PI;
            const attackArc = Math.PI / 12;
            
            let hitCandidates = [];
            
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (hitItemsThisAttack.has(item.id)) continue;
                
                const dx = item.x - mantisX;
                const dy = item.y - mantisY;
                const itemAngle = Math.atan2(dy, dx);
                let angleDiff = itemAngle - attackAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                
                const distToMantis = Math.sqrt(dx * dx + dy * dy);
                const inAngle = Math.abs(angleDiff) < attackArc;
                const inRange = distToMantis < mantis.clawLength + item.size + 10;
                
                if (inAngle && inRange) {
                    hitCandidates.push({ item, index: i, dist: distToMantis });
                }
            }
            
            if (hitCandidates.length > 0) {
                hitCandidates.sort((a, b) => a.dist - b.dist);
                const closest = hitCandidates[0];
                hitItemsThisAttack.add(closest.item.id);
                if (closest.item.type === 'cicada') hitCicada(closest.item, closest.index);
                else hitTrap(closest.item, closest.index);
            }
        }
        
        function hitCicada(item, index) {
            items.splice(index, 1);
            
            // 连击强化系统
            const now = Date.now();
            combo = (now - lastHitTime < 2000) ? combo + 1 : 1;
            lastHitTime = now;
            maxCombo = Math.max(maxCombo, combo);
            
            // 强化状态判定：每3连击进入强化
            if (combo > 0 && combo % 3 === 0) {
                activatePowerMode();
            }
            
            // 强化状态：双倍分数，特殊音效
            let points = item.value + Math.min(combo * 5, 50);
            if (isPowered) {
                points *= 2;
                playSound('powerhit');  // 强化音效
            } else {
                playSound('hit');
            }
            score += points;
            
            if (combo > 1) showCombo(combo);
            
            // 强化状态：更多粒子、红色粒子
            const particleColor = isPowered ? '#FF6B6B' : '#FFD700';
            const particleCount = isPowered ? 20 : 12;
            createParticles(item.x, item.y, particleColor, particleCount);
            
            // 露珠生成概率随关卡增加，强化状态下更高
            const baseDewRate = Math.min(0.6, 0.4 + level * 0.02);  // 40%→60%
            const dewRate = isPowered ? baseDewRate * 1.5 : baseDewRate;  // 强化状态+50%
            
            if (Math.random() < dewRate) {
                // 露珠生成在螳螂轨道附近，方便收集
                const angle = Math.atan2(item.y - centerY, item.x - centerX);
                // 生成在树桩边缘到螳螂之间的位置（适配新轨道+60）
                const distance = diskRadius + 80 + Math.random() * 40; // 螳螂远离后调整：210-250px
                
                dewdrops_arr.push({
                    angle: angle,
                    distance: distance,
                    value: isPowered ? 2 : 1,  // 强化状态露珠价值翻倍
                    life: 240  // 增加存在时间从180到240帧（4秒）
                });
            }
            updateUI();
            
            const cicadasLeft = items.filter(item => item.type === 'cicada').length;
            if (cicadasLeft === 0) nextLevel();
        }
        
        function activatePowerMode() {
            isPowered = true;
            powerTimer = 180;  // 3秒（60fps）
            showPowerIndicator();
        }
        
        function showPowerIndicator() {
            // 显示强化状态提示
            const el = document.createElement('div');
            el.className = 'combo';
            el.textContent = '🔥 强化!';
            el.style.color = '#FF6B6B';
            el.style.fontSize = '36px';
            document.getElementById('uiLayer').appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }
        
        function hitTrap(item, index) {
            items.splice(index, 1);
            playSound('trap');
            health--;
            combo = 0;
            isPowered = false;  // 击中陷阱取消强化状态
            powerTimer = 0;
            createParticles(item.x, item.y, '#8B0000', 15);
            shakeScreen();
            if (health <= 0) gameOver();
            updateUI();
        }
        
        function nextLevel() {
            level++;
            // 速度成长曲线：前期慢，后期快
            // 第1关: 0.015, 第5关: 0.022, 第10关: 0.032, 最高0.045
            mantis.speed = Math.min(0.045, 0.015 + Math.pow(level, 1.3) * 0.003);
            spawnInitialItems();
            updateUI();
            playSound('levelup');
            
            // 复用或创建关卡提示元素
            if (!levelElCache) {
                levelElCache = document.createElement('div');
                levelElCache.className = 'combo';
                document.getElementById('uiLayer').appendChild(levelElCache);
            }
            levelElCache.textContent = '第 ' + level + ' 关!';
            levelElCache.style.color = '#00FF00';
            levelElCache.style.opacity = '1';
            levelElCache.style.transform = 'translate(-50%, -50%) scale(1)';
            
            // 使用 CSS 动画类替代手动移除
            levelElCache.style.animation = 'none';
            levelElCache.offsetHeight; // 强制重绘
            levelElCache.style.animation = 'comboPop 1.5s ease-out forwards';
        }
        
        function showCombo(c) {
            // 复用或创建连击提示元素
            if (!comboElCache) {
                comboElCache = document.createElement('div');
                comboElCache.className = 'combo';
                document.getElementById('uiLayer').appendChild(comboElCache);
            }
            comboElCache.textContent = c + ' 连击!';
            comboElCache.style.color = '#FFD700';
            
            // 重置动画
            comboElCache.style.animation = 'none';
            comboElCache.offsetHeight; // 强制重绘
            comboElCache.style.animation = 'comboPop 1s ease-out forwards';
        }
        
        // 粒子对象池
        const particlePool = [];
        const MAX_POOL_PARTICLES = 100;
        
        function getParticleFromPool() {
            return particlePool.pop() || {};
        }
        
        function returnParticleToPool(p) {
            if (particlePool.length < MAX_POOL_PARTICLES) {
                particlePool.push(p);
            }
        }
        
        function createParticles(x, y, color, count = 12) {
            // 限制同时存在的粒子总数
            const actualCount = Math.min(count, 30 - particles.length);
            if (actualCount <= 0) return;
            
            for (let i = 0; i < actualCount; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.8;
                const speed = 3 + Math.random() * 5;
                const p = getParticleFromPool();
                p.x = x;
                p.y = y;
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.life = 40 + Math.random() * 20;
                p.color = color;
                p.size = 4 + Math.random() * 6;
                particles.push(p);
            }
        }
        
        function shakeScreen() {
            container.style.transform = 'translate(5px, 5px)';
            setTimeout(() => {
                container.style.transform = 'translate(-5px, -5px)';
                setTimeout(() => container.style.transform = 'translate(0, 0)', 50);
            }, 50);
        }
        
        function drawVignette() {
            // 绘制 vignette 效果 - 中心亮，四周暗
            const gradient = ctx.createRadialGradient(
                centerX, centerY, diskRadius * 0.8,  // 内圆（亮区）
                centerX, centerY, Math.max(GAME_WIDTH, GAME_HEIGHT) * 0.8  // 外圆（暗区）
            );
            gradient.addColorStop(0, 'rgba(0,0,0,0)');  // 中心透明
            gradient.addColorStop(0.5, 'rgba(0,0,0,0.1)');  // 过渡
            gradient.addColorStop(1, 'rgba(0,0,0,0.35)');  // 边缘较暗
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        }
        
        function drawDisk() {
            // 绘制树桩
            if (images.treeDisk) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.drawImage(images.treeDisk, -diskRadius, -diskRadius, diskRadius * 2, diskRadius * 2);
                ctx.restore();
            }
            
            // 绘制树桩中心
            if (images.treeCenter) {
                ctx.drawImage(images.treeCenter, centerX - 18, centerY - 18, 36, 36);  // 树桩缩小后，中心也缩小
            }
        }
        
        function drawMantis() {
            const orbitR = diskRadius + 130;  // 螳螂远离树桩，增加距离感
            const mantisX = centerX + Math.cos(mantis.angle) * orbitR;
            const mantisY = centerY + Math.sin(mantis.angle) * orbitR;
            const faceAngle = mantis.angle + Math.PI;
            
            ctx.save();
            ctx.translate(mantisX, mantisY);
            ctx.rotate(faceAngle + Math.PI / 2);
            
            // 绘制螳螂身体 - 新尺寸 140x180
            if (images.mantisBody) {
                ctx.drawImage(images.mantisBody, -70, -90, 140, 180);
            }
            
            // 绘制攻击爪 - 新尺寸 80x160
            if (mantis.isAttacking && mantis.clawLength > 0) {
                const clawImg = images.mantisClawAttack || images.mantisClaw;
                if (clawImg) {
                    const clawScale = mantis.clawLength / 160;  // 基于新爪子高度160
                    
                    // 左爪
                    ctx.save();
                    ctx.translate(-35, -50);  // 调整位置适配大身体
                    ctx.scale(1, clawScale);
                    ctx.drawImage(clawImg, -40, -160, 80, 160);
                    ctx.restore();
                    
                    // 右爪
                    ctx.save();
                    ctx.translate(35, -50);
                    ctx.scale(1, clawScale);
                    ctx.drawImage(clawImg, -40, -160, 80, 160);
                    ctx.restore();
                }
            }
            
            // 预备状态：爪子微张，身体后仰
            if (mantis.isPreparing) {
                const clawImg = images.mantisClawAttack || images.mantisClaw;
                if (clawImg) {
                    // 预备时爪子微张（20%长度）
                    const prepareScale = 0.2 + Math.sin(mantis.prepareProgress * Math.PI * 4) * 0.05;
                    
                    // 左爪 - 微微张开
                    ctx.save();
                    ctx.translate(-35, -50);
                    ctx.scale(1, prepareScale);
                    ctx.drawImage(clawImg, -40, -160, 80, 160);
                    ctx.restore();
                    
                    // 右爪 - 微微张开
                    ctx.save();
                    ctx.translate(35, -50);
                    ctx.scale(1, prepareScale);
                    ctx.drawImage(clawImg, -40, -160, 80, 160);
                    ctx.restore();
                }
                
                // 预备提示：身体周围有微光
                ctx.save();
                ctx.globalAlpha = 0.3 + Math.sin(mantis.prepareProgress * Math.PI * 4) * 0.2;
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, 90, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            // 刀光效果 - 攻击时显示
            if (mantis.isAttacking && mantis.clawLength > 0 && images.slashEffect) {
                ctx.globalAlpha = isPowered ? 1.0 : 0.7;
                const scale = isPowered ? 1.5 : 1.2;
                const size = 140 * scale;
                const offset = size / 2;
                
                // 强化状态：红色光晕
                if (isPowered) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    ctx.shadowColor = '#FF6B6B';
                    ctx.shadowBlur = 30;
                    ctx.drawImage(images.slashEffect, -offset, -mantis.clawLength - offset, size, size);
                    ctx.restore();
                } else {
                    ctx.drawImage(images.slashEffect, -50, -mantis.clawLength - 50, 100, 100);
                }
                ctx.globalAlpha = 1;
            }
            
            ctx.restore();
        }
        
        function update() {
            if (state !== 'playing') return;
            
            // 倒计时更新（每秒一次）
            const now = Date.now();
            if (now - lastTimeUpdate >= 1000) {
                gameTime--;
                lastTimeUpdate = now;
                updateTimerUI();
                
                if (gameTime <= 0) {
                    gameOver();
                    return;
                }
            }
            
            // 强化状态计时
            if (isPowered) {
                powerTimer--;
                if (powerTimer <= 0) {
                    isPowered = false;
                }
            }
            
            // 预备状态：屁股扭动，但不移动
            if (mantis.isPreparing) {
                mantis.prepareProgress += 0.15;
                
                // 扭动动画：快速小幅度摆动
                const wiggle = Math.sin(mantis.prepareProgress * Math.PI * 4) * 0.08;
                mantis.angle += wiggle;
                
                // 预备完成，开始攻击
                if (mantis.prepareProgress >= 1) {
                    mantis.isPreparing = false;
                    mantis.isAttacking = true;
                    mantis.attackProgress = 0;
                    hitItemsThisAttack.clear();
                    playSound('attack');
                }
            } else {
                // 正常移动
                mantis.angle += mantis.speed * mantis.direction;
            }
            
            if (mantis.isAttacking) {
                mantis.attackProgress += 0.12;
                if (mantis.attackProgress < 0.5) {
                    mantis.clawLength = mantis.maxClawLength * (mantis.attackProgress * 2);
                } else {
                    mantis.clawLength = mantis.maxClawLength * (2 - mantis.attackProgress * 2);
                }
                if (mantis.attackProgress >= 0.5 && mantis.attackProgress < 0.65) {
                    checkAttackCollision();
                }
                if (mantis.attackProgress >= 1) {
                    mantis.isAttacking = false;
                    mantis.attackProgress = 0;
                    mantis.clawLength = 0;
                }
            }
            
            // 更新粒子，使用对象池
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life--;
                if (p.life <= 0) {
                    returnParticleToPool(particles.splice(i, 1)[0]);
                }
            }
            
            // 更新露珠位置（跟随树桩旋转）
            for (let i = dewdrops_arr.length - 1; i >= 0; i--) {
                const dew = dewdrops_arr[i];
                dew.life--;
                
                // 计算露珠当前位置（跟随树桩旋转）
                const dewX = centerX + Math.cos(dew.angle) * dew.distance;
                const dewY = centerY + Math.sin(dew.angle) * dew.distance;
                
                // 检测螳螂碰撞 - 增加碰撞范围
                const orbitR = diskRadius + 130;  // 螳螂远离树桩，增加距离感
                const mantisX = centerX + Math.cos(mantis.angle) * orbitR;
                const mantisY = centerY + Math.sin(mantis.angle) * orbitR;
                const dist = Math.sqrt((dewX - mantisX) ** 2 + (dewY - mantisY) ** 2);
                
                if (dist < 80) {  // 增加碰撞范围到80
                    dewdrops += dew.value;
                    // 每收集1滴露珠，增加10秒倒计时
                    gameTime += 10;
                    playSound('dewdrop');
                    createParticles(dewX, dewY, '#87CEEB', 8);
                    updateUI();
                    dewdrops_arr.splice(i, 1);
                } else if (dew.life <= 0) {
                    dewdrops_arr.splice(i, 1);
                }
            }
        }
        
        function draw() {
            // 绘制背景
            if (images.bg) {
                ctx.drawImage(images.bg, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            } else {
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            }
            
            // 绘制 vignette 聚光效果（让注意力集中在树桩区域）
            drawVignette();
            
            drawDisk();
            
            // 绘制物品
            items.forEach(item => {
                const img = images[item.image];
                if (img) {
                    ctx.drawImage(img, item.x - item.size, item.y - item.size, item.size * 2, item.size * 2);
                }
            });
            
            // 绘制露珠
            dewdrops_arr.forEach(dew => {
                if (images.dewdrop) {
                    // 计算当前位置（跟随树桩旋转）
                    const dewX = centerX + Math.cos(dew.angle) * dew.distance;
                    const dewY = centerY + Math.sin(dew.angle) * dew.distance;
                    ctx.globalAlpha = Math.min(1, dew.life / 60);  // 最后1秒开始淡出
                    ctx.drawImage(images.dewdrop, dewX - 15, dewY - 15, 30, 30);
                }
            });
            ctx.globalAlpha = 1;
            
            drawMantis();
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 60;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function updateUI() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('dewdropDisplay').textContent = dewdrops;
            document.getElementById('levelDisplay').textContent = level;
            
            const healthBar = document.getElementById('healthBar');
            let heartsHTML = '';
            for (let i = 0; i < 3; i++) {
                if (i < health) {
                    heartsHTML += '<span class="health-heart">❤️</span>';
                } else {
                    heartsHTML += '<span class="health-heart" style="opacity:0.3;">🖤</span>';
                }
            }
            healthBar.innerHTML = heartsHTML;
        }
        
        // 更新倒计时UI
        function updateTimerUI() {
            const timerText = document.getElementById('timerText');
            const timerWaterLevel = document.getElementById('timerWaterLevel');
            
            timerText.textContent = gameTime;
            
            // 水位随时间下降（基于300秒）
            const waterHeight = Math.max(6, (gameTime / 300) * 14 + 6); // 6-20px
            const waterY = 20 - waterHeight;
            timerWaterLevel.setAttribute('d', `M6 ${13 + waterY}C6 ${13 + waterY} 8 ${waterY + 7} 12 ${waterY + 7}C16 ${waterY + 7} 18 ${13 + waterY} 18 ${13 + waterY}V20H6V${13 + waterY}Z`);
            
            // 时间少于10秒变红色警告
            if (gameTime <= 10) {
                timerText.classList.add('warning');
                timerWaterLevel.setAttribute('fill', '#FF6B6B');
            } else {
                timerText.classList.remove('warning');
                timerWaterLevel.setAttribute('fill', '#87CEEB');
            }
        }
        
        // 文化文案池
        const endQuotes = [
            { text: '螳螂一击，得其所哉', sub: '专注当下，方得始终' },
            { text: '猎得数蝉，未觉秋深', sub: '时光易逝，把握此刻' },
            { text: '一念捕猎，一念在后', sub: '进取之时，莫忘警惕' },
            { text: '蝉噪林逾静，螳螂伺其机', sub: '静中生动，待机而发' },
            { text: '秋风起兮，蝉鸣急兮，螳螂伺之', sub: '顺势而为，伺机而动' },
            { text: '刀光一闪，蝉已入怀', sub: '眼疾手快，事半功倍' },
            { text: '树桩之上，生死之间', sub: '危机四伏，步步为营' }
        ];
        
        function gameOver() {
            state = 'gameover';
            stopBGM();
            playSound('gameover');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalDewdrops').textContent = dewdrops;
            document.getElementById('maxCombo').textContent = maxCombo;
            
            // 随机显示文化文案
            const quote = endQuotes[Math.floor(Math.random() * endQuotes.length)];
            const quoteEl = document.getElementById('endQuote');
            if (quoteEl) {
                quoteEl.querySelector('.quote-text').textContent = quote.text;
                quoteEl.querySelector('.quote-sub').textContent = quote.sub;
            }
            
            document.getElementById('gameOverModal').classList.remove('hidden');
        }
        
        function startGame() {
            document.getElementById('startModal').classList.add('hidden');
            state = 'playing';
            playBGM();
            resetGame();
        }
        
        function restartGame() {
            document.getElementById('gameOverModal').classList.add('hidden');
            state = 'playing';
            playBGM();
            resetGame();
        }
        
        function resetGame() {
            score = 0; dewdrops = 0; level = 1; health = 3; combo = 0; maxCombo = 0;
            powerCombo = 0; isPowered = false; powerTimer = 0;
            gameTime = 300; lastTimeUpdate = Date.now();
            particles = []; dewdrops_arr = [];
            mantis.angle = -Math.PI / 2;
            mantis.isAttacking = false;
            mantis.attackProgress = 0;
            mantis.clawLength = 0;
            mantis.isPreparing = false;
            mantis.prepareProgress = 0;
            mantis.speed = 0.015;
            spawnInitialItems();
            updateUI();
            updateTimerUI();
        }
        
        // 事件绑定
        document.getElementById('startBtn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });
        
        document.getElementById('restartBtn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            restartGame();
        });
        
        function handleGameClick(e) {
            if (state !== 'playing') return;
            attack();
        }
        
        canvas.addEventListener('mousedown', handleGameClick);
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            handleGameClick(e);
        }, { passive: false });
        
        // 帧率控制 - 手机上限制为30fps以节省电量和性能
        let lastFrameTime = 0;
        const TARGET_FPS = 30;
        const FRAME_INTERVAL = 1000 / TARGET_FPS;
        let frameCount = 0;
        let lastFpsTime = 0;
        
        function loop(currentTime) {
            requestAnimationFrame(loop);
            
            // 帧率限制
            const deltaTime = currentTime - lastFrameTime;
            if (deltaTime < FRAME_INTERVAL) return;
            lastFrameTime = currentTime - (deltaTime % FRAME_INTERVAL);
            
            update();
            draw();
            
            // FPS 计数（调试用）
            frameCount++;
            if (currentTime - lastFpsTime >= 1000) {
                // console.log('FPS:', frameCount);
                frameCount = 0;
                lastFpsTime = currentTime;
            }
        }
        
        // 初始化
        loadAssets().then(() => {
            console.log('Assets loaded');
            requestAnimationFrame(loop);
        });
    </script>
</body>
