<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接财宝大作战 - Ponghood</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* 导航栏 */
        .navbar {
            width: 100%;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .nav-logo {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-logo::before {
            content: "◆";
            color: #ffd700;
        }

        .nav-back {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-back:hover {
            color: #fff;
        }

        /* 游戏容器 */
        .game-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
            max-width: 900px;
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .game-title {
            color: #ffd700;
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .game-stats {
            display: flex;
            gap: 30px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid;
            text-align: center;
            min-width: 100px;
        }

        .stat-box.score {
            border-color: #ffd700;
        }

        .stat-box.time {
            border-color: #ff6b6b;
        }

        .stat-label {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .stat-value {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .stat-box.score .stat-value {
            color: #ffd700;
        }

        .stat-box.time .stat-value {
            color: #ff6b6b;
        }

        .combo-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
        }

        .combo-display.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .combo-display.combo-high {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
        }

        /* 游戏画布 */
        .game-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(255, 215, 0, 0.1);
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0c1445 0%, #1a237e 50%, #283593 100%);
            border-radius: 16px;
        }

        /* 覆盖层 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .overlay-subtitle {
            color: #8b949e;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.5;
        }

        .game-stats-overlay {
            margin: 10px auto 20px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: inline-block;
        }

        .overlay-score {
            font-size: 72px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
        }

        .overlay-score-label {
            color: #8b949e;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 图例 */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8b949e;
            font-size: 13px;
        }

        .legend-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .legend-icon.copper { background: #cd7f32; }
        .legend-icon.silver { background: #c0c0c0; }
        .legend-icon.gold { background: #ffd700; }
        .legend-icon.ruby { background: #e0115f; box-shadow: 0 0 10px #e0115f; }
        .legend-icon.bomb { background: #2c2c2c; border: 2px solid #ff4444; }

        /* 控制提示 */
        .controls-hint {
            margin-top: 15px;
            color: #6b7280;
            font-size: 13px;
            display: flex;
            gap: 20px;
        }

        .key {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: monospace;
        }

        /* 爆炸动画 */
        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">Ponghood</a>
        <a href="index.html" class="nav-back">← 返回主页</a>
    </nav>

    <!-- 游戏区域 -->
    <div class="game-wrapper">
        <div class="game-header">
            <h1 class="game-title">💰 接财宝大作战</h1>
            <div class="game-stats">
                <div class="stat-box score">
                    <div class="stat-label">得分</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
                <div class="stat-box time">
                    <div class="stat-label">时间</div>
                    <div class="stat-value" id="timeDisplay">30</div>
                </div>
            </div>
        </div>

        <div class="game-container" id="gameContainer">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            
            <!-- Combo显示 -->
            <div class="combo-display" id="comboDisplay"></div>
            
            <!-- 开始/结束覆盖层 -->
            <div class="overlay" id="gameOverlay">
                <div class="overlay-title" id="overlayTitle">接财宝大作战</div>
                <div class="overlay-subtitle" id="overlaySubtitle">
                    控制小车接住金币和宝石，躲避炸弹！<br>
                    30秒时间，看你能得多少分！
                </div>
                <div class="overlay-score hidden" id="finalScore">0</div>
                <div class="overlay-score-label hidden" id="finalScoreLabel">最终得分</div>
                <button class="btn btn-primary" id="startBtn">开始游戏</button>
            </div>
        </div>

        <!-- 图例 -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-icon copper"></div>
                <span>铜币 +10</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon silver"></div>
                <span>银币 +30</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon gold"></div>
                <span>金币 +50</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon ruby"></div>
                <span>红宝石 +100</span>
            </div>
            <div class="legend-item">
                <div class="legend-icon bomb"></div>
                <span>炸弹 💥 游戏结束</span>
            </div>
        </div>

        <!-- 控制提示 -->
        <div class="controls-hint">
            <span><span class="key">←</span> <span class="key">→</span> 或 <span class="key">A</span> <span class="key">D</span> 移动</span>
            <span>小车有惯性，提前预判！</span>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 500,
            GAME_DURATION: 30,
            
            // 玩家小车参数 - 笨重感设计
            PLAYER: {
                WIDTH: 90,
                HEIGHT: 50,
                Y: 420,
                MAX_SPEED: 4.5,
                ACCELERATION: 0.08,
                DECELERATION: 0.12,
                FRICTION: 0.05
            },
            
            // 掉落物类型 - 统一慢速，放大尺寸
            ITEMS: {
                COPPER: { type: 'copper', score: 10, speed: 1.8, radius: 18, color: '#cd7f32', prob: 0.35 },
                SILVER: { type: 'silver', score: 30, speed: 2.0, radius: 20, color: '#c0c0c0', prob: 0.25 },
                GOLD: { type: 'gold', score: 50, speed: 2.2, radius: 22, color: '#ffd700', prob: 0.15 },
                RUBY: { type: 'ruby', score: 100, speed: 2.5, radius: 20, color: '#e0115f', prob: 0.10 },
                BOMB: { type: 'bomb', score: 0, speed: 2.0, radius: 24, color: '#2c2c2c', prob: 0.15 }
            }
        };

        // 游戏状态
        let gameState = {
            isPlaying: false,
            score: 0,
            timeLeft: CONFIG.GAME_DURATION,
            lastTime: 0,
            items: [],
            particles: [],
            spawnTimer: 0,
            spawnInterval: 800,
            combo: 0,
            comboTimer: 0,
            lastCatchTime: 0,
            floatingTexts: [],
            stats: {
                copper: 0,
                silver: 0,
                gold: 0,
                ruby: 0
            }
        };

        // 玩家状态
        let player = {
            x: CONFIG.CANVAS_WIDTH / 2 - CONFIG.PLAYER.WIDTH / 2,
            vx: 0,
            facing: 1 // 1 = 右, -1 = 左
        };

        // 输入状态
        let keys = {
            left: false,
            right: false
        };

        // Canvas 和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('gameContainer');
        const overlay = document.getElementById('gameOverlay');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySubtitle = document.getElementById('overlaySubtitle');
        const finalScore = document.getElementById('finalScore');
        const finalScoreLabel = document.getElementById('finalScoreLabel');
        const comboDisplay = document.getElementById('comboDisplay');

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = true;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = false;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = false;
            }
        });

        // 触摸支持
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            if (diff < -20) {
                keys.left = true;
                keys.right = false;
            } else if (diff > 20) {
                keys.left = false;
                keys.right = true;
            }
        });

        canvas.addEventListener('touchend', () => {
            keys.left = false;
            keys.right = false;
        });

        // 开始按钮
        startBtn.addEventListener('click', startGame);

        // 初始化游戏
        function init() {
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameState.score = 0;
            gameState.timeLeft = CONFIG.GAME_DURATION;
            gameState.items = [];
            gameState.particles = [];
            gameState.spawnTimer = 0;
            gameState.combo = 0;
            gameState.comboTimer = 0;
            gameState.lastCatchTime = 0;
            gameState.floatingTexts = [];
            gameState.stats = {
                copper: 0,
                silver: 0,
                gold: 0,
                ruby: 0
            };
            
            player.x = CONFIG.CANVAS_WIDTH / 2 - CONFIG.PLAYER.WIDTH / 2;
            player.vx = 0;
            player.facing = 1;
            
            keys.left = false;
            keys.right = false;
            
            updateUI();
        }

        function startGame() {
            resetGame();
            gameState.isPlaying = true;
            gameState.lastTime = performance.now();
            overlay.classList.add('hidden');
            finalScore.classList.add('hidden');
            finalScoreLabel.classList.add('hidden');
            overlayTitle.textContent = '接财宝大作战';
            overlaySubtitle.innerHTML = '控制小车接住金币和宝石，躲避炸弹！<br>30秒时间，看你能得多少分！';
        }

        function endGame(reason) {
            gameState.isPlaying = false;
            overlay.classList.remove('hidden');
            finalScore.classList.remove('hidden');
            finalScoreLabel.classList.remove('hidden');
            finalScore.textContent = gameState.score;
            
            // 生成统计HTML - 放在得分下方
            const statsHTML = `
                <div style="margin: 15px auto; padding: 12px 20px; background: rgba(255,255,255,0.05); border-radius: 12px; display: inline-block;">
                    <div style="color: #8b949e; font-size: 12px; margin-bottom: 8px;">收集统计</div>
                    <div style="display: flex; justify-content: center; gap: 20px;">
                        <div style="text-align: center;">
                            <div style="color: #cd7f32; font-size: 18px; font-weight: bold;">${gameState.stats.copper}</div>
                            <div style="color: #6b7280; font-size: 10px;">铜币</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #c0c0c0; font-size: 18px; font-weight: bold;">${gameState.stats.silver}</div>
                            <div style="color: #6b7280; font-size: 10px;">银币</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #ffd700; font-size: 18px; font-weight: bold;">${gameState.stats.gold}</div>
                            <div style="color: #6b7280; font-size: 10px;">金币</div>
                        </div>
                        <div style="text-align: center;">
                            <div style="color: #e0115f; font-size: 18px; font-weight: bold;">${gameState.stats.ruby}</div>
                            <div style="color: #6b7280; font-size: 10px;">红宝石</div>
                        </div>
                    </div>
                    <div style="margin-top: 6px; color: #6b7280; font-size: 11px;">
                        最高连击: <span style="color: #ff6b6b; font-weight: bold;">${gameState.combo}</span>
                    </div>
                </div>
            `;
            
            if (reason === 'bomb') {
                overlayTitle.textContent = '💥 游戏结束！';
                overlaySubtitle.innerHTML = '<div style="font-size: 14px;">哎呀，被炸弹炸到了！下次要更小心哦~</div>';
            } else {
                overlayTitle.textContent = '⏰ 时间到！';
                overlaySubtitle.innerHTML = '<div style="font-size: 14px;">时间到了！来看看你的成绩吧~</div>';
            }
            
            // 将统计插入到finalScore后面
            finalScore.insertAdjacentHTML('afterend', statsHTML);
            
            startBtn.textContent = '再玩一次';
        }

        // 更新玩家物理
        function updatePlayer() {
            // 加速度逻辑
            if (keys.left && !keys.right) {
                // 向左加速
                if (player.vx > 0) {
                    // 正在向右走，先刹车
                    player.vx -= CONFIG.PLAYER.DECELERATION;
                    if (player.vx < 0) player.vx = 0;
                } else {
                    player.vx -= CONFIG.PLAYER.ACCELERATION;
                }
                player.facing = -1;
            } else if (keys.right && !keys.left) {
                // 向右加速
                if (player.vx < 0) {
                    // 正在向左走，先刹车
                    player.vx += CONFIG.PLAYER.DECELERATION;
                    if (player.vx > 0) player.vx = 0;
                } else {
                    player.vx += CONFIG.PLAYER.ACCELERATION;
                }
                player.facing = 1;
            } else {
                // 没有按键，摩擦力减速
                if (player.vx > 0) {
                    player.vx -= CONFIG.PLAYER.FRICTION;
                    if (player.vx < 0) player.vx = 0;
                } else if (player.vx < 0) {
                    player.vx += CONFIG.PLAYER.FRICTION;
                    if (player.vx > 0) player.vx = 0;
                }
            }
            
            // 限制最大速度
            player.vx = Math.max(-CONFIG.PLAYER.MAX_SPEED, Math.min(CONFIG.PLAYER.MAX_SPEED, player.vx));
            
            // 更新位置
            player.x += player.vx;
            
            // 边界限制
            if (player.x < 0) {
                player.x = 0;
                player.vx = 0;
            }
            if (player.x > CONFIG.CANVAS_WIDTH - CONFIG.PLAYER.WIDTH) {
                player.x = CONFIG.CANVAS_WIDTH - CONFIG.PLAYER.WIDTH;
                player.vx = 0;
            }
        }

        // 生成掉落物 - 策略性布局
        function spawnItem() {
            // 场上物品太多时不生成，避免过于拥挤
            if (gameState.items.length >= 6) {
                return;
            }
            
            const rand = Math.random();
            
            // 25% 概率生成"两难抉择"场景（场上物品较少时更容易触发）
            if (rand < 0.25 && gameState.items.length <= 2) {
                createDilemmaScene();
                return;
            }
            
            // 正常生成单个物品
            const itemRand = Math.random();
            let cumulative = 0;
            let selectedItem = null;
            
            for (const key in CONFIG.ITEMS) {
                cumulative += CONFIG.ITEMS[key].prob;
                if (itemRand <= cumulative) {
                    selectedItem = CONFIG.ITEMS[key];
                    break;
                }
            }
            
            if (selectedItem) {
                // 确保新物品不会和现有物品在同一X位置（避免重叠）
                let x = Math.random() * (CONFIG.CANVAS_WIDTH - 80) + 40;
                let attempts = 0;
                while (attempts < 10) {
                    let tooClose = false;
                    for (let item of gameState.items) {
                        if (Math.abs(item.x - x) < 60) {
                            tooClose = true;
                            break;
                        }
                    }
                    if (!tooClose) break;
                    x = Math.random() * (CONFIG.CANVAS_WIDTH - 80) + 40;
                    attempts++;
                }
                
                gameState.items.push({
                    x: x,
                    y: -40,
                    ...selectedItem,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.05
                });
            }
        }
        
        // 创建两难抉择场景
        function createDilemmaScene() {
            const sceneType = Math.random();
            const centerX = CONFIG.CANVAS_WIDTH / 2;
            
            if (sceneType < 0.4) {
                // 场景1: 左右高价值，中间炸弹
                // 左边红宝石
                gameState.items.push({
                    x: centerX - 180,
                    y: -40,
                    ...CONFIG.ITEMS.RUBY,
                    rotation: 0,
                    rotSpeed: 0.02
                });
                // 中间炸弹（稍晚落下）
                gameState.items.push({
                    x: centerX,
                    y: -100,
                    ...CONFIG.ITEMS.BOMB,
                    rotation: 0,
                    rotSpeed: 0.03
                });
                // 右边红宝石
                gameState.items.push({
                    x: centerX + 180,
                    y: -40,
                    ...CONFIG.ITEMS.RUBY,
                    rotation: 0,
                    rotSpeed: -0.02
                });
            } else if (sceneType < 0.7) {
                // 场景2: 金币+银币组合，但中间有炸弹阻隔
                gameState.items.push({
                    x: centerX - 120,
                    y: -40,
                    ...CONFIG.ITEMS.GOLD,
                    rotation: 0,
                    rotSpeed: 0.02
                });
                gameState.items.push({
                    x: centerX,
                    y: -60,
                    ...CONFIG.ITEMS.BOMB,
                    rotation: 0,
                    rotSpeed: 0.03
                });
                gameState.items.push({
                    x: centerX + 120,
                    y: -40,
                    ...CONFIG.ITEMS.SILVER,
                    rotation: 0,
                    rotSpeed: -0.02
                });
            } else {
                // 场景3: 连续三个，中间是炸弹
                gameState.items.push({
                    x: centerX - 100,
                    y: -40,
                    ...CONFIG.ITEMS.GOLD,
                    rotation: 0,
                    rotSpeed: 0.02
                });
                gameState.items.push({
                    x: centerX,
                    y: -40,
                    ...CONFIG.ITEMS.BOMB,
                    rotation: 0,
                    rotSpeed: 0.03
                });
                gameState.items.push({
                    x: centerX + 100,
                    y: -40,
                    ...CONFIG.ITEMS.GOLD,
                    rotation: 0,
                    rotSpeed: -0.02
                });
            }
        }

        // 更新掉落物
        function updateItems() {
            for (let i = gameState.items.length - 1; i >= 0; i--) {
                const item = gameState.items[i];
                item.y += item.speed;
                item.rotation += item.rotSpeed;
                
                // 检查碰撞
                const playerCenterX = player.x + CONFIG.PLAYER.WIDTH / 2;
                const playerCenterY = CONFIG.PLAYER.Y + CONFIG.PLAYER.HEIGHT / 2;
                const dx = item.x - playerCenterX;
                const dy = item.y - playerCenterY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < item.radius + CONFIG.PLAYER.WIDTH / 2 - 5 &&
                    item.y > CONFIG.PLAYER.Y - 20 && item.y < CONFIG.PLAYER.Y + CONFIG.PLAYER.HEIGHT + 20) {
                    // 碰撞发生
                    if (item.type === 'bomb') {
                        // 播放爆炸音效
                        playExplosionSound();
                        
                        createExplosion(item.x, item.y);
                        endGame('bomb');
                        return;
                    } else {
                        // 计算combo
                        const now = Date.now();
                        if (now - gameState.lastCatchTime < 1500) {
                            gameState.combo++;
                        } else {
                            gameState.combo = 1;
                        }
                        gameState.lastCatchTime = now;

                        // 统计收集数量
                        if (item.type === 'copper') gameState.stats.copper++;
                        else if (item.type === 'silver') gameState.stats.silver++;
                        else if (item.type === 'gold') gameState.stats.gold++;
                        else if (item.type === 'ruby') gameState.stats.ruby++;

                        // 计算最终得分（基础分 + combo奖励）
                        const comboBonus = Math.floor(gameState.combo / 3) * 5; // 每3连击+5分
                        const finalScore = item.score + comboBonus;
                        gameState.score += finalScore;

                        // 创建浮动文字
                        createFloatingText(item.x, item.y - 30, `+${finalScore}`, item.color, 24);
                        if (gameState.combo >= 3) {
                            createFloatingText(item.x, item.y - 65, `${gameState.combo}连击!`, '#ff6b6b', 28);

                            // 显示combo大文字
                            comboDisplay.textContent = `${gameState.combo} 连击!`;
                            comboDisplay.classList.add('active');
                            if (gameState.combo >= 5) {
                                comboDisplay.classList.add('combo-high');
                            }
                            setTimeout(() => {
                                comboDisplay.classList.remove('active');
                                comboDisplay.classList.remove('combo-high');
                            }, 800);
                        }
                        
                        // 播放收集音效
                        playCollectSound(finalScore);
                        
                        // 播放连击音效
                        if (gameState.combo >= 3) {
                            playComboSound(gameState.combo);
                        }
                        
                        createParticles(item.x, item.y, item.color);
                        gameState.items.splice(i, 1);
                        updateUI();
                        continue;
                    }
                }
                
                // 移除超出屏幕的
                if (item.y > CONFIG.CANVAS_HEIGHT + 30) {
                    gameState.items.splice(i, 1);
                }
            }
        }

        // 创建收集粒子效果
        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // 创建爆炸效果
        function createExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.5,
                    color: Math.random() > 0.5 ? '#ff4444' : '#ff8800',
                    size: Math.random() * 8 + 4
                });
            }
        }

        // 创建浮动文字
        function createFloatingText(x, y, text, color, fontSize = 20) {
            gameState.floatingTexts.push({
                x: x,
                y: y,
                text: text,
                color: color,
                fontSize: fontSize,
                life: 1,
                vy: -1.5
            });
        }

        // 音效系统 - 使用Web Audio API生成音效
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // 播放收集音效（根据价值不同音调）
        function playCollectSound(value) {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 根据分值设置音调
            if (value <= 10) {
                // 铜币 - 低音
                oscillator.frequency.setValueAtTime(440, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(220, audioContext.currentTime + 0.1);
            } else if (value <= 30) {
                // 银币 - 中音
                oscillator.frequency.setValueAtTime(554, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(277, audioContext.currentTime + 0.1);
            } else if (value <= 50) {
                // 金币 - 高音
                oscillator.frequency.setValueAtTime(659, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(330, audioContext.currentTime + 0.1);
            } else {
                // 红宝石 - 最高音+和声
                oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioContext.currentTime + 0.15);
                
                // 添加和声
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                osc2.frequency.setValueAtTime(1109, audioContext.currentTime);
                gain2.gain.setValueAtTime(0.1, audioContext.currentTime);
                gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                osc2.start(audioContext.currentTime);
                osc2.stop(audioContext.currentTime + 0.15);
            }
            
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }
        
        // 播放连击音效
        function playComboSound(combo) {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const now = audioContext.currentTime;
            
            // 根据连击数播放不同音效
            if (combo >= 5) {
                // 高连击 - 华丽音效
                for (let i = 0; i < 3; i++) {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.setValueAtTime(523 + i * 131, now + i * 0.05);
                    gain.gain.setValueAtTime(0.15, now + i * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.2);
                    
                    osc.start(now + i * 0.05);
                    osc.stop(now + i * 0.05 + 0.2);
                }
            } else if (combo >= 3) {
                // 3连击 - 上升音效
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.linearRampToValueAtTime(880, now + 0.15);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }
        
        // 播放爆炸音效
        function playExplosionSound() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const now = audioContext.currentTime;
            
            // 噪音缓冲
            const bufferSize = audioContext.sampleRate * 0.5;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            
            const noiseGain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, now);
            filter.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            
            noiseGain.gain.setValueAtTime(0.4, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioContext.destination);
            
            noise.start(now);
            noise.stop(now + 0.5);
            
            // 添加低频轰鸣
            const osc = audioContext.createOscillator();
            const oscGain = audioContext.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioContext.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
            
            oscGain.gain.setValueAtTime(0.3, now);
            oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            
            osc.start(now);
            osc.stop(now + 0.3);
        }

        // 更新粒子
        function updateParticles() {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3; // 重力
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }

        // 更新浮动文字
        function updateFloatingTexts() {
            for (let i = gameState.floatingTexts.length - 1; i >= 0; i--) {
                const ft = gameState.floatingTexts[i];
                ft.y += ft.vy;
                ft.life -= 0.015;
                
                if (ft.life <= 0) {
                    gameState.floatingTexts.splice(i, 1);
                }
            }
        }

        // 更新UI
        function updateUI() {
            scoreDisplay.textContent = gameState.score;
            timeDisplay.textContent = Math.ceil(gameState.timeLeft);
        }

        // 绘制函数
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // 绘制背景网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < CONFIG.CANVAS_WIDTH; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CONFIG.CANVAS_HEIGHT);
                ctx.stroke();
            }
            for (let i = 0; i < CONFIG.CANVAS_HEIGHT; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(CONFIG.CANVAS_WIDTH, i);
                ctx.stroke();
            }
            
            // 绘制玩家小车
            drawPlayer();
            
            // 绘制掉落物
            gameState.items.forEach(item => drawItem(item));
            
            // 绘制粒子
            gameState.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            
            // 绘制浮动文字
            gameState.floatingTexts.forEach(ft => {
                ctx.globalAlpha = ft.life;
                ctx.fillStyle = ft.color;
                ctx.font = `bold ${ft.fontSize}px Arial`;
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(ft.text, ft.x, ft.y);
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1;
            });
        }

        // 绘制玩家小车 - 笨重风格
        function drawPlayer() {
            const x = player.x;
            const y = CONFIG.PLAYER.Y;
            const w = CONFIG.PLAYER.WIDTH;
            const h = CONFIG.PLAYER.HEIGHT;
            
            // 车身阴影（更大更厚重）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(x + 8, y + 8, w, h);
            
            // 车身主体 - 厚重金属感
            const gradient = ctx.createLinearGradient(x, y, x, y + h);
            gradient.addColorStop(0, '#5a7a9a');
            gradient.addColorStop(0.3, '#4a6a8a');
            gradient.addColorStop(0.7, '#3a5a7a');
            gradient.addColorStop(1, '#2a4a6a');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, w, h);
            
            // 车身边框 - 厚重感
            ctx.strokeStyle = '#1a3a5a';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            
            // 车顶 - 厚重装甲感
            ctx.fillStyle = '#4a5a6a';
            ctx.fillRect(x + 8, y - 18, w - 16, 18);
            ctx.strokeStyle = '#2a3a4a';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 8, y - 18, w - 16, 18);
            
            // 车窗 - 小窗厚重感
            ctx.fillStyle = '#2a4a6a';
            ctx.fillRect(x + 15, y - 14, w - 30, 10);
            ctx.fillStyle = '#87ceeb';
            ctx.globalAlpha = 0.6;
            ctx.fillRect(x + 17, y - 12, w - 34, 6);
            ctx.globalAlpha = 1;
            
            // 大车轮 - 笨重感
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(x + 18, y + h - 2, 14, 0, Math.PI * 2);
            ctx.arc(x + w - 18, y + h - 2, 14, 0, Math.PI * 2);
            ctx.fill();
            
            // 轮胎纹理
            ctx.strokeStyle = '#0a0a0a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x + 18, y + h - 2, 14, 0, Math.PI * 2);
            ctx.arc(x + w - 18, y + h - 2, 14, 0, Math.PI * 2);
            ctx.stroke();
            
            // 轮毂
            ctx.fillStyle = '#4a4a4a';
            ctx.beginPath();
            ctx.arc(x + 18, y + h - 2, 7, 0, Math.PI * 2);
            ctx.arc(x + w - 18, y + h - 2, 7, 0, Math.PI * 2);
            ctx.fill();
            
            // 车头装甲板
            ctx.fillStyle = '#3a4a5a';
            ctx.fillRect(x + 5, y + 8, w - 10, 20);
            
            // 车灯 - 大车灯
            ctx.fillStyle = player.facing > 0 ? '#ffeb3b' : '#ff4444';
            ctx.beginPath();
            ctx.arc(player.facing > 0 ? x + w - 10 : x + 10, y + 18, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 车灯发光效果
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(player.facing > 0 ? x + w - 10 : x + 10, y + 18, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 笨重移动时的震动效果
            if (Math.abs(player.vx) > 0.5) {
                const shake = Math.sin(Date.now() / 50) * 1;
                ctx.fillStyle = 'rgba(100, 100, 100, 0.3)';
                ctx.fillRect(x + shake, y + h - 5, w, 3);
            }
            
            // 速度线（高速移动时）
            if (Math.abs(player.vx) > 2) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 3;
                const offset = player.vx > 0 ? -30 : w + 30;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(x + offset, y + 12 + i * 12);
                    ctx.lineTo(x + offset + (player.vx > 0 ? -20 : 20), y + 12 + i * 12);
                    ctx.stroke();
                }
            }
        }

        function drawItem(item) {
            ctx.save();
            ctx.translate(item.x, item.y);
            ctx.rotate(item.rotation);
            
            if (item.type === 'copper' || item.type === 'silver' || item.type === 'gold') {
                // 绘制硬币
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, item.radius);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.3, item.color);
                gradient.addColorStop(1, shadeColor(item.color, -30));
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, item.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 边框
                ctx.strokeStyle = shadeColor(item.color, -40);
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 内圈
                ctx.strokeStyle = shadeColor(item.color, -20);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(0, 0, item.radius - 4, 0, Math.PI * 2);
                ctx.stroke();
                
                // 符号
                ctx.fillStyle = shadeColor(item.color, -50);
                ctx.font = `bold ${item.radius}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 1);
                
            } else if (item.type === 'ruby') {
                // 绘制宝石（菱形）
                ctx.shadowColor = item.color;
                ctx.shadowBlur = 15;
                
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.moveTo(0, -item.radius);
                ctx.lineTo(item.radius, 0);
                ctx.lineTo(0, item.radius);
                ctx.lineTo(-item.radius, 0);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.moveTo(0, -item.radius + 4);
                ctx.lineTo(item.radius - 4, 0);
                ctx.lineTo(0, 4);
                ctx.lineTo(-item.radius + 4, 0);
                ctx.closePath();
                ctx.fill();
                
            } else if (item.type === 'bomb') {
                // 绘制炸弹
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(0, 3, item.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 引信
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, -item.radius + 3);
                ctx.quadraticCurveTo(5, -item.radius - 8, 10, -item.radius - 5);
                ctx.stroke();
                
                // 火花
                const sparkTime = Date.now() / 100;
                ctx.fillStyle = '#ff6600';
                for (let i = 0; i < 5; i++) {
                    const angle = sparkTime + i * 1.2;
                    const dist = 3 + Math.sin(sparkTime * 2 + i) * 2;
                    ctx.beginPath();
                    ctx.arc(
                        10 + Math.cos(angle) * dist,
                        -item.radius - 5 + Math.sin(angle) * dist,
                        2, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                
                // 骷髅标志
                ctx.fillStyle = '#ff4444';
                ctx.font = `bold ${item.radius}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💀', 0, 2);
            }
            
            ctx.restore();
        }

        // 颜色加深/变浅工具函数
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // 游戏主循环
        function gameLoop(currentTime) {
            const deltaTime = currentTime - gameState.lastTime;
            gameState.lastTime = currentTime;
            
            if (gameState.isPlaying) {
                // 更新倒计时
                gameState.timeLeft -= deltaTime / 1000;
                if (gameState.timeLeft <= 0) {
                    gameState.timeLeft = 0;
                    endGame('timeout');
                }
                updateUI();
                
                // 更新玩家
                updatePlayer();
                
                // 生成掉落物
                gameState.spawnTimer += deltaTime;
                // 动态生成节奏，保持场上始终有挑战
                // 根据当前场上物品数量调整生成速度
                const itemCount = gameState.items.length;
                let currentInterval;
                if (itemCount === 0) {
                    currentInterval = 300; // 空场时立即补充
                } else if (itemCount === 1) {
                    currentInterval = 500; // 只有一个时快速补充
                } else if (itemCount <= 3) {
                    currentInterval = 700; // 2-3个时正常节奏
                } else {
                    currentInterval = 1000; // 四个以上时放慢
                }
                
                if (gameState.spawnTimer > currentInterval) {
                    spawnItem();
                    gameState.spawnTimer = 0;
                }
                
                // 更新掉落物
                updateItems();
                
                // 更新粒子
                updateParticles();
                updateFloatingTexts();
            }
            
            // 绘制
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // 启动游戏
        init();
    </script>
</body>
